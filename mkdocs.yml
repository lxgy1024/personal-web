site_name: 我的个人网站
site_url: https://lxgy1024.github.io/personal-web/
site_author: lxgy1024
site_description: 个人博客与项目展示

exclude_docs: |
  superpowers/

repo_name: lxgy1024/personal-web
repo_url: https://github.com/lxgy1024/personal-web
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.share
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到亮色模式

plugins:
  - search
  - blog:
      blog_dir: blog
      post_dir: blog/posts
      archive: true
      categories: true
  - tags

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list

nav:
  - 首页: index.md
  - 博客:
    - blog/index.md
  - 项目:
    - projects/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lxgy1024

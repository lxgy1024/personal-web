site_name: 我的个人网站
site_url: https://lxgy1024.github.io/personal-web/
site_author: lxgy1024
site_description: 个人博客与项目展示

exclude_docs: |
  superpowers/

repo_name: lxgy1024/personal-web
repo_url: https://github.com/lxgy1024/personal-web
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.share
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到亮色模式

plugins:
  - search
  - blog:
      blog_dir: blog
      post_dir: blog/posts
      archive: false
      categories: false
  - tags

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list

nav:
  - 首页: index.md
  - 博客:
    - blog/index.md
    - 随笔:
      - 随笔: blog/随笔/index.md
      - H 城日落之后: blog/随笔/h-city-after-sunset.md
      - 追风赶月莫停留: blog/随笔/chasing-wind-and-moon.md
      - 体考模拟感想: blog/随笔/pe-exam-simulation.md
      - ZJU 与我: blog/随笔/zju-and-me.md
      - 济南冬风里的降书: blog/随笔/surrender-in-jinan-winter.md
    - 人物:
      - 人物: blog/人物/index.md
      - 我最佩服的人: blog/人物/the-person-i-admire-most.md
      - 百日誓师？: blog/人物/hundred-day-pledge.md
    - 创作:
      - 创作: blog/创作/index.md
      - 开始，追风飞鸟: blog/创作/chasing-the-wind-flying-bird.md
  - 项目:
    - projects/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lxgy1024

name: Twitter → Bluesky Sync

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  trigger-bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel sync function
        run: |
          response=$(curl -sS "https://twitter-bridge-eight.vercel.app/api/cron/sync" --max-time 60)
          echo "Response: $response"
          synced=$(echo "$response" | jq -r '.synced // 0')
          errors=$(echo "$response" | jq -r '.errors | join("; ")' 2>/dev/null || echo "")
          if [ "$synced" = "0" ] && [ -n "$errors" ]; then
            echo "::error::Sync failed: $errors"
            exit 1
          fi
          echo "Synced $synced tweets"
      - name: Wait for next cycle (~3 min interval)
        run: sleep 175
      - name: Trigger next sync run
        run: |
          curl -sS -X POST \
            "https://api.github.com/repos/lxgy1024/personal-web/actions/workflows/sync-twitter.yml/dispatches" \
            -H "Authorization: Bearer ${{ secrets.BRIDGE_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d '{"ref":"main"}'

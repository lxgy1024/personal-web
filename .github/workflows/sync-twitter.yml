name: Twitter → Bluesky Sync

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  trigger-bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel sync function
        run: |
          curl -fsS "https://twitter-bsky-bridge.vercel.app/api/cron/sync" \
            --max-time 30 || echo "sync failed (will retry next interval)"
